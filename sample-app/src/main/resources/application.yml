spring:
  application:
    name: cassandra-auto-migration-sample
  cassandra:
    contact-points: ${CASSANDRA_CONTACT_POINTS:localhost}
    port: ${CASSANDRA_PORT:9042}
    local-datacenter: ${CASSANDRA_LOCAL_DATACENTER:datacenter1}
    keyspace-name: ${CASSANDRA_KEYSPACE:sample_app}
    schema-action: none

cassandra:
  auto-migration:
    mode: ${CASSANDRA_MIGRATION_MODE:SCRIPT}
    fail-on-unsupported: true
    report-unmanaged-objects: true
