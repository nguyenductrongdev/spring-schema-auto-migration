services:
  cassandra:
    image: ${CASSANDRA_IMAGE:-cassandra:5.0.8}
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: migration-sample
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  cassandra-init:
    image: ${CASSANDRA_IMAGE:-cassandra:5.0.8}
    depends_on:
      cassandra:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - >-
        echo "CREATE KEYSPACE IF NOT EXISTS sample_app
        WITH replication = {'class': 'NetworkTopologyStrategy', 'datacenter1': 1};"
        | cqlsh cassandra 9042
    restart: "no"
