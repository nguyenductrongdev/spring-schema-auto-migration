name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Java 17 baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify baseline build
        run: ./mvnw -B --no-transfer-progress verify

  compatibility:
    name: Boot ${{ matrix.boot }} / Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - boot: 3.5.16
            java: 17
          - boot: 4.0.7
            java: 17
          - boot: 4.1.0
            java: 17
          - boot: 3.5.16
            java: 25
          - boot: 4.1.0
            java: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "${{ matrix.java }}"
          cache: maven

      - name: Install library artifacts
        run: ./mvnw -B --no-transfer-progress -DskipTests install

      - name: Test installed JAR as a Boot ${{ matrix.boot }} consumer
        run: >-
          ./mvnw -B --no-transfer-progress
          -f compatibility-tests/pom.xml
          -Dspring-boot.version=${{ matrix.boot }}
          verify

  integration:
    name: Boot ${{ matrix.boot }} / Cassandra ${{ matrix.cassandra }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - boot: 3.5.16
            java: 17
            cassandra: 4.1.11
          - boot: 3.5.16
            java: 17
            cassandra: 5.0.8
          - boot: 4.0.7
            java: 21
            cassandra: 5.0.8
          - boot: 4.1.0
            java: 25
            cassandra: 5.0.8
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "${{ matrix.java }}"
          cache: maven

      - name: Run provider integration tests
        run: >-
          ./mvnw -B --no-transfer-progress
          -pl schema-auto-migration-cassandra-spring-boot-starter
          -am -Pintegration-tests,skip-unit-tests
          -Dspring-boot.version=${{ matrix.boot }}
          -Dcassandra.test.image=cassandra:${{ matrix.cassandra }}
          verify
